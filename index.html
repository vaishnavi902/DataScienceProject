<!DOCTYPE html>
<html>
<head>
<style>
    table, th, td {
        border: 1px solid black; /* Adds visible borders for clarity */
        border-collapse: collapse; /* Makes borders single line */
        padding: 8px; /* Adds spacing within cells */
    }
</style>
</head>
<body>

<h2>Basic HTML Table</h2>

<table>
  <thead>
    <tr>
      <th>Header 1</th>
      <th>Header 2</th>
    </tr>
  </thead>
  <tbody>
    <tr>
      <td>Row 1, Data 1</td>
      <td>Row 1, Data 2</td>
    </tr>
    <tr>
      <td>Row 2, Data 1</td>
      <td>Row 2, Data 2</td>
    </tr>
  </tbody>
</table>

</body>
</html>
